name: Bug report
description: Report a reproducible problem
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Clear and short summary
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide minimal reproducible steps
      placeholder: |
        1. Run ...
        2. Use file ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS / Python / ffmpeg / model
      placeholder: Windows 11, Python 3.12, ffmpeg 7.1, large-v3
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: shell
